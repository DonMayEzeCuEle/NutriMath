<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriMath | Calculadora Nutricional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #457820;
            --accent-color: #B8D93B;
            --bg-color: #f4f7f6;
            --text-dark: #2d3436;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .main-card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        .selector-group {
            margin-bottom: 25px;
            text-align: center;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
            color: #636e72;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        .panel {
            border-top: 1px solid #eee;
            padding-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        .hidden { display: none; }

        .radio-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #355e18;
            transform: translateY(-2px);
        }

        .result-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f7eb;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed var(--primary-color);
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>NutriMath</h1>

    <div class="main-card">
        <div class="selector-group">
            <label for="formulaSelect">¿Qué deseas calcular?</label>
            <select id="formulaSelect" onchange="showPanel()">
                <option value="lorentz">Fórmula de Lorentz</option>
                <option value="barrier">Fórmula de Barrier</option>
                <option value="imc">IMC (Masa Corporal)</option>
                <option value="pesoTMT">Peso Teórico (Talla)</option>
                <option value="pesoCPO">Peso Corregido (Obesidad)</option>
                <option value="pesoCPA">Peso Corregido (Amputación)</option>
            </select>
        </div>

        <div id="lorentzPanel" class="panel">
            <label>Talla (cm):</label>
            <input type="number" id="lorentzHeight" value="170">
            <label>Edad:</label>
            <input type="number" id="lorentzAge" value="25">
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="lorentzSex" value="male" checked> Hombre</label>
                <label class="radio-option"><input type="radio" name="lorentzSex" value="female"> Mujer</label>
            </div>
            <button class="button" onclick="calculateLorentz()">Calcular</button>
            <div class="result-container">
                <label>Peso Ideal Sugerido:</label>
                <span id="lorentzResult" class="result-value">--</span>
            </div>
        </div>

        <div id="imcPanel" class="panel hidden">
            <label>Talla (cm):</label>
            <input type="number" id="imcHeight" value="170">
            <label>Peso Actual (kg):</label>
            <input type="number" id="imcWeight" value="70">
            <button class="button" onclick="calculateIMC()">Calcular IMC</button>
            <div class="result-container">
                <label>Tu IMC es:</label>
                <span id="imcResult" class="result-value">--</span>
            </div>
        </div>

        </div>

    <script>
        // La lógica JS se mantiene igual, solo asegúrate de que los IDs coincidan
        function showPanel() {
            const selectedValue = document.getElementById('formulaSelect').value;
            const panels = ['lorentzPanel', 'imcPanel']; // Añade todos tus IDs aquí
            
            // Ocultar todos
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            
            // Mostrar seleccionado
            const activePanel = document.getElementById(selectedValue + 'Panel');
            if (activePanel) activePanel.classList.remove('hidden');
        }

        function calculateLorentz() {
            let edad = parseFloat(document.getElementById('lorentzAge').value);
            let talla = parseFloat(document.getElementById('lorentzHeight').value);
            let res = 0;
            let sexo = document.querySelector('input[name="lorentzSex"]:checked').value;
            
            if (sexo === 'male') {
                res = talla - 100 - (((talla - 150) / 4) + ((edad - 20) / 4));
            } else {
                res = talla - 100 - ((talla - 150) / 4 + ((edad - 20) / 2.5));
            }
            document.getElementById('lorentzResult').innerText = res.toFixed(2) + " kg";
        }

        function calculateIMC() {
            let peso = parseFloat(document.getElementById('imcWeight').value);
            let tallaM = parseFloat(document.getElementById('imcHeight').value) / 100;
            let res = peso / (tallaM * tallaM);
            document.getElementById('imcResult').innerText = res.toFixed(2);
        }
    </script>
</body>
</html>
