<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriMath | Calculadora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #457820;
            --light-green: #eef5e9;
            --accent-green: #B8D93B;
            --bg-color: #f3f4f6;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --border-radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-green);
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-top: 5px;
            font-size: 1rem;
        }

        .main-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
            margin-top: 15px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(69, 120, 32, 0.1);
        }

        .selector-container {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
        }

        .panel {
            animation: fadeIn 0.4s ease;
        }

        .hidden {
            display: none;
        }

        h2 {
            font-size: 1.25rem;
            color: var(--primary-green);
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .radio-group.amputation {
            grid-template-columns: 1fr;
        }

        .radio-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #fafafa;
            margin: 0;
            font-weight: 400;
        }

        .radio-label:hover {
            background-color: #f3f4f6;
        }

        .radio-label:has(input:checked) {
            border-color: var(--primary-green);
            background-color: var(--light-green);
            color: var(--primary-green);
            font-weight: 500;
        }

        input[type="radio"] {
            margin-right: 8px;
            accent-color: var(--primary-green);
        }

        .button {
            width: 100%;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .button:hover {
            background-color: #3a5e1a;
        }

        .button:active {
            transform: scale(0.98);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: var(--light-green);
            border: 1px dashed var(--primary-green);
            border-radius: 8px;
            text-align: center;
        }

        .result-box label {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .result-box span {
            display: block;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--primary-green);
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NutriMath</h1>
        <div class="subtitle">Herramientas de cálculo antropométrico</div>
    </div>

    <div class="main-card">
        <div class="selector-container">
            <label for="formulaSelect">¿Qué deseas calcular?</label>
            <select id="formulaSelect" onchange="showPanel()">
                <option value="">-- Seleccionar fórmula --</option>
                <option value="lorentz" selected>Fórmula de Lorentz</option>
                <option value="barrier">Fórmula de Barrier</option>
                <option value="imc">Índice de Masa Corporal (IMC)</option>
                <option value="pesoTMT">Peso Teórico Mediante Talla</option>
                <option value="pesoCPO">Peso Corregido por Obesidad</option>
                <option value="pesoCPA">Peso Corregido por Amputación</option>
            </select>
        </div>

        <div class="container">
            <div id="lorentzPanel" class="panel">
                <h2>Lorentz</h2>
                <label for="lorentzHeight">Talla (cm):</label>
                <input type="number" id="lorentzHeight" min="100" max="250" step="1" value="150">
                
                <label for="lorentzAge">Edad (años):</label>
                <input type="number" id="lorentzAge" min="1" max="110" step="1" value="25">
                
                <label>Sexo:</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="lorentzSex" value="male" checked> Hombre</label>
                    <label class="radio-label"><input type="radio" name="lorentzSex" value="female"> Mujer</label>
                </div>
                
                <button class="button" onclick="calculateLorentz()">Calcular</button>
                <div class="result-box">
                    <label>Resultado</label>
                    <span id="lorentzResult">--</span>
                </div>
            </div>

            <div id="barrierPanel" class="panel hidden">
                <h2>Barrier</h2>
                <label for="barrierHeight">Talla (cm):</label>
                <input type="number" id="barrierHeight" min="100" max="250" step="1" value="150">
                
                <label for="barrierAge">Edad (años):</label>
                <input type="number" id="barrierAge" min="1" max="110" step="1" value="25">
                
                <label>Sexo:</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="barrierSex" value="male" checked> Hombre</label>
                    <label class="radio-label"><input type="radio" name="barrierSex" value="female"> Mujer</label>
                </div>
                
                <button class="button" onclick="calculateBarrier()">Calcular</button>
                <div class="result-box">
                    <label>Resultado</label>
                    <span id="barrierResult">--</span>
                </div>
            </div>

            <div id="imcPanel" class="panel hidden">
                <h2>Índice de Masa Corporal</h2>
                <label for="imcHeight">Talla (cm):</label>
                <input type="number" id="imcHeight" min="100" max="250" step="1" value="150">
                
                <label for="imcWeight">Peso (kg):</label>
                <input type="number" id="imcWeight" min="35" max="250" step="0.5" value="50">
                
                <button class="button" onclick="calculateIMC()">Calcular</button>
                <div class="result-box">
                    <label>Resultado IMC</label>
                    <span id="imcResult">--</span>
                </div>
            </div>

            <div id="pesoTMTPanel" class="panel hidden">
                <h2>Peso Teórico Mediante Talla</h2>
                <label for="tmtHeight">Talla (cm):</label>
                <input type="number" id="tmtHeight" min="100" max="250" step="1" value="150">
                
                <button class="button" onclick="calculateTMT()">Calcular</button>
                <div class="result-box">
                    <label>Resultado</label>
                    <span id="tmtResult">--</span>
                </div>
            </div>

            <div id="pesoCPOPanel" class="panel hidden">
                <h2>Peso Corregido por Obesidad</h2>
                <label for="cpoRealWeight">Peso Real (kg):</label>
                <input type="number" id="cpoRealWeight" min="35" max="250" step="0.5" value="70">
                
                <label for="cpoIdealWeight">Peso Ideal (kg):</label>
                <input type="number" id="cpoIdealWeight" min="35" max="250" step="0.5" value="70">
                
                <label for="cpoTheoreticalWeight">Peso Teórico (kg):</label>
                <input type="number" id="cpoTheoreticalWeight" min="35" max="250" step="0.5" value="70">
                
                <button class="button" onclick="calculateCPO()">Calcular</button>
                <div class="result-box">
                    <label>Resultado</label>
                    <span id="cpoResult">--</span>
                </div>
            </div>

            <div id="pesoCPAPanel" class="panel hidden">
                <h2>Peso Corregido por Amputación</h2>
                <label for="cpaTheoreticalWeight">Peso Teórico (kg):</label>
                <input type="number" id="cpaTheoreticalWeight" min="35" max="250" step="0.5" value="70">
                
                <label>Porcentaje de Amputaciones:</label>
                <div class="radio-group amputation">
                    <label class="radio-label"><input type="radio" name="cpaAmputation" value="fullLeg" checked> Pierna Completa</label>
                    <label class="radio-label"><input type="radio" name="cpaAmputation" value="legAndFoot"> Pie y Pierna</label>
                    <label class="radio-label"><input type="radio" name="cpaAmputation" value="foot"> Pie</label>
                    <label class="radio-label"><input type="radio" name="cpaAmputation" value="fullArm"> Brazo Completo</label>
                    <label class="radio-label"><input type="radio" name="cpaAmputation" value="armAndForearm"> Mano y Antebrazo</label>
                    <label class="radio-label"><input type="radio" name="cpaAmputation" value="hand"> Mano</label>
                </div>
                
                <button class="button" onclick="calculateCPA()">Calcular</button>
                <div class="result-box">
                    <label>Resultado</label>
                    <span id="cpaResult">--</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // La lógica JavaScript se mantiene exactamente igual para asegurar compatibilidad
        function showPanel() {
            const selectedValue = document.getElementById('formulaSelect').value;
            const panels = ['lorentzPanel', 'barrierPanel', 'imcPanel', 'pesoTMTPanel', 'pesoCPOPanel', 'pesoCPAPanel'];
            panels.forEach(panel => {
                document.getElementById(panel).classList.add('hidden');
            });
            if (selectedValue) {
                document.getElementById(selectedValue + 'Panel').classList.remove('hidden');
            }
        }

        // Ejecutar showPanel al cargar por si hay una opción preseleccionada
        window.onload = showPanel;

        function calculateLorentz() {
            let edad = parseFloat(document.getElementById('lorentzAge').value);
            let talla = parseFloat(document.getElementById('lorentzHeight').value);
            let res = 0;
            if (document.querySelector('input[name="lorentzSex"]:checked').value === 'male') {
                res = talla - 100 - (((talla - 150) / 4) + ((edad - 20) / 4));
            } else {
                res = talla - 100 - ((talla - 150) / 4 + ((edad - 20) / 2.5));
            }
            document.getElementById('lorentzResult').innerText = res.toFixed(2);
        }

        function calculateBarrier() {
            let edad = parseFloat(document.getElementById('barrierAge').value);
            let talla = parseFloat(document.getElementById('barrierHeight').value);
            let res = 0;
            if (document.querySelector('input[name="barrierSex"]:checked').value === 'male') {
                res = (edad * 0.17) + talla - 100 - 6.78;
            } else {
                res = (edad * 0.17) + talla - 100 - 7.71;
            }
            document.getElementById('barrierResult').innerText = res.toFixed(2);
        }

        function calculateIMC() {
            let peso = parseFloat(document.getElementById('imcWeight').value);
            let tallaM = parseFloat(document.getElementById('imcHeight').value) / 100;
            let res = peso / (tallaM * tallaM);
            document.getElementById('imcResult').innerText = res.toFixed(2);
        }

        function calculateTMT() {
            let talla = parseFloat(document.getElementById('tmtHeight').value);
            let res = 50 + 0.75 * (talla - 150);
            document.getElementById('tmtResult').innerText = res.toFixed(2);
        }

        function calculateCPO() {
            let pesoReal = parseFloat(document.getElementById('cpoRealWeight').value);
            let pesoIdeal = parseFloat(document.getElementById('cpoIdealWeight').value);
            let pesoTeorico = parseFloat(document.getElementById('cpoTheoreticalWeight').value);
            let res = ((pesoReal - pesoIdeal) * 0.25) + pesoTeorico;
            document.getElementById('cpoResult').innerText = res.toFixed(2);
        }

        function calculateCPA() {
            let pesoTeorico = parseFloat(document.getElementById('cpaTheoreticalWeight').value);
            let porcentaje = 0;
            switch (document.querySelector('input[name="cpaAmputation"]:checked').value) {
                case 'fullLeg':
                    porcentaje = 0.7;
                    break;
                case 'legAndFoot':
                    porcentaje = 5.9;
                    break;
                case 'foot':
                    porcentaje = 1.5;
                    break;
                case 'fullArm':
                    porcentaje = 16;
                    break;
                case 'armAndForearm':
                    porcentaje = 2.3;
                    break;
                case 'hand':
                    porcentaje = 5.0;
                    break;
            }
            let res = ((100 - porcentaje) / 100) * pesoTeorico;
            document.getElementById('cpaResult').innerText = res.toFixed(2);
        }
    </script>
</body>
</html>
